<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M'lab Groceries</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #F5F0E6;
      --surface: #FFFDF8;
      --surface-hover: #FFF9EF;
      --surface-selected: #EFF6F1;
      --primary: #2D6A4F;
      --primary-hover: #235740;
      --primary-light: #D4E8DB;
      --accent: #C0956C;
      --accent-light: #F5EDE3;
      --danger: #B84233;
      --danger-light: #FDF0EE;
      --text: #2A2522;
      --text-secondary: #6E645C;
      --text-muted: #A89E94;
      --border: #DED5C8;
      --border-light: #EDE6DA;
      --shadow-sm: 0 1px 2px rgba(42,37,34,0.05);
      --shadow-md: 0 2px 8px rgba(42,37,34,0.08);
      --shadow-lg: 0 4px 16px rgba(42,37,34,0.1);
      --radius: 10px;
      --radius-lg: 14px;
    }

    html { font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Figtree', -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.5;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 30%, rgba(192,149,108,0.07) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 70%, rgba(45,106,79,0.05) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 48px 20px 160px;
    }

    /* ── Header ────────────────────────────── */

    header {
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    header h1 {
      font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
      font-weight: 700;
      font-size: 3rem;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header p {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 4px;
      font-weight: 400;
    }

    /* ── Add bar ───────────────────────────── */

    .add-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.08s forwards;
    }

    .add-bar input {
      flex: 1;
      padding: 14px 18px;
      font-family: inherit;
      font-size: 0.95rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .add-bar input::placeholder { color: var(--text-muted); }

    .add-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192,149,108,0.15);
    }

    .add-bar input.valid {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(45,106,79,0.12);
    }

    .add-bar input.invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(184,66,51,0.1);
    }

    .add-bar button {
      width: 50px;
      height: 50px;
      border: none;
      border-radius: var(--radius);
      background: var(--primary);
      color: #fff;
      font-size: 1.5rem;
      font-weight: 300;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .add-bar button:hover { background: var(--primary-hover); }
    .add-bar button:active { transform: scale(0.95); }

    /* ── Toolbar ───────────────────────────── */

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 4px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.14s forwards;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .toolbar-left label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      cursor: pointer;
      user-select: none;
    }

    .item-count {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tool-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .tool-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-light);
    }

    .tool-btn svg { flex-shrink: 0; }

    /* ── Custom checkbox ───────────────────── */

    .chk {
      position: relative;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .chk input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      z-index: 1;
      margin: 0;
    }

    .chk-box {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chk-box svg {
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s;
      stroke: #fff;
    }

    .chk input:checked + .chk-box {
      background: var(--primary);
      border-color: var(--primary);
    }

    .chk input:checked + .chk-box svg {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Item cards ────────────────────────── */

    .item-list { display: flex; flex-direction: column; gap: 8px; }

    .item-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border-light);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: all 0.2s;
      animation: slideIn 0.3s ease;
    }

    .item-card:hover {
      border-color: var(--border);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .item-card.selected {
      background: var(--surface-selected);
      border-color: var(--primary-light);
    }

    .item-card.staple {
      border-color: var(--accent);
      background: linear-gradient(135deg, var(--surface) 0%, var(--accent-light) 100%);
    }

    .item-card.staple:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(192,149,108,0.2);
    }

    .item-card.duplicate-flash {
      animation: flash 0.6s ease;
    }

    .item-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: contain;
      background: #fff;
      flex-shrink: 0;
    }

    .item-thumb[src=""] { display: none; }

    .item-body {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      line-height: 1.3;
      outline: none;
      border-radius: 4px;
      padding: 1px 4px;
      margin: -1px -4px;
      transition: background 0.15s;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-name:hover { background: rgba(0,0,0,0.03); }
    .item-name:focus { background: rgba(192,149,108,0.1); }

    .item-name.unnamed:empty::before {
      content: attr(data-placeholder);
      color: var(--text-muted);
      font-weight: 400;
      font-style: italic;
    }

    .item-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 3px;
    }

    .item-asin {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      letter-spacing: 0.03em;
    }

    .item-link {
      font-size: 0.78rem;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: color 0.15s;
    }

    .item-link:hover { color: var(--primary); }

    .item-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    /* ── Quantity stepper ──────────────────── */

    .qty {
      display: flex;
      align-items: center;
      background: var(--bg);
      border-radius: 8px;
      overflow: hidden;
    }

    .qty button {
      width: 30px;
      height: 30px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
      font-weight: 500;
    }

    .qty button:hover {
      background: var(--border-light);
      color: var(--text);
    }

    .qty span {
      width: 26px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .qty span.bump { animation: bump 0.2s ease; }

    /* ── Staple button ────────────────────── */

    .staple-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .staple-btn:hover {
      color: var(--accent);
      background: var(--accent-light);
    }

    .staple-btn.active {
      color: var(--accent);
    }

    /* ── Delete button ─────────────────────── */

    .del-btn {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .del-btn:hover {
      background: var(--danger-light);
      color: var(--danger);
    }

    /* ── Store section headers ────────────── */

    .store-section {
      margin-top: 20px;
      margin-bottom: 10px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .store-section:first-child { margin-top: 0; }

    .store-section h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--text);
    }

    .store-section .store-count {
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .store-section::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    /* ── Cart button ───────────────────────── */

    .cart-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s;
    }

    .cart-bar.visible {
      pointer-events: auto;
      opacity: 1;
      transform: translateY(0);
    }

    .cart-btn {
      width: 100%;
      max-width: 600px;
      padding: 14px 28px;
      border: none;
      border-radius: var(--radius-lg);
      background: var(--primary);
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(45,106,79,0.3);
      letter-spacing: 0.01em;
    }

    .cart-btn:hover {
      background: var(--primary-hover);
      box-shadow: 0 6px 24px rgba(45,106,79,0.35);
    }

    .cart-btn:active { transform: scale(0.98); }

    /* ── Bookmarklet setup ─────────────────── */

    .setup-banner {
      margin-bottom: 20px;
      padding: 16px 20px;
      background: var(--accent-light);
      border: 1.5px dashed var(--accent);
      border-radius: var(--radius);
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s forwards;
    }

    .setup-banner p {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .setup-banner p strong { color: var(--text); }

    .bookmarklet-link {
      display: inline-block;
      padding: 10px 24px;
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      text-decoration: none;
      cursor: grab;
      transition: background 0.15s, transform 0.1s;
      box-shadow: var(--shadow-md);
    }

    .bookmarklet-link:hover { background: var(--primary-hover); }
    .bookmarklet-link:active { cursor: grabbing; transform: scale(0.97); }

    .setup-dismiss {
      display: block;
      margin-top: 8px;
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
      font-family: inherit;
    }

    /* ── Order report ──────────────────────── */

    .report-panel {
      margin-bottom: 20px;
      padding: 16px 18px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      animation: slideIn 0.3s ease;
    }

    .report-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
    }

    .report-head h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 1.2rem;
      color: var(--text);
    }

    .report-dismiss {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      padding: 2px 6px;
    }

    .report-dismiss:hover { color: var(--danger); }

    .report-sub {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .report-rows { margin-top: 10px; }

    .report-row {
      display: flex;
      gap: 9px;
      padding: 6px 0;
      border-top: 1px solid var(--border-light);
      font-size: 0.85rem;
      align-items: baseline;
    }

    .report-dot {
      flex-shrink: 0;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      position: relative;
      top: -1px;
    }

    .report-dot.added { background: var(--primary); }
    .report-dot.partial { background: var(--accent); }
    .report-dot.unavailable, .report-dot.failed { background: var(--danger); }
    .report-dot.unknown { background: var(--text-muted); }

    .report-row .r-name { font-weight: 600; }

    .report-row .r-detail {
      color: var(--text-secondary);
      font-size: 0.78rem;
    }

    .report-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .report-wait {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: 0.88rem;
    }

    .report-wait .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.85); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* ── Empty state ───────────────────────── */

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      display: none;
    }

    .empty-state.visible { display: block; }

    .empty-state .empty-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state h2 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 1.5rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .empty-state p {
      font-size: 0.9rem;
      color: var(--text-muted);
      max-width: 320px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .empty-state .hint {
      margin-top: 20px;
      padding: 14px 20px;
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      font-size: 0.82rem;
      color: var(--text-secondary);
      display: inline-block;
    }

    .empty-state .hint code {
      background: var(--accent-light);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.8rem;
      color: var(--accent);
    }

    /* ── Toast ─────────────────────────────── */

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--text);
      color: var(--bg);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Animations ────────────────────────── */

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bump {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    @keyframes flash {
      0%, 100% { background: var(--surface); }
      30% { background: #FFF3CD; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    .shake { animation: shake 0.35s ease; }

    /* ── Responsive ────────────────────────── */

    @media (max-width: 500px) {
      .app { padding: 32px 16px 160px; }
      header h1 { font-size: 2.4rem; }
      .item-card { gap: 10px; padding: 12px 14px; }
      .item-actions { gap: 4px; }
      .tool-btn span { display: none; }
      .toolbar-right { gap: 4px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>M'lab Groceries</h1>
      <p>Whole Foods shopping list</p>
    </header>

    <div class="add-bar">
      <input type="text" id="addInput" placeholder="Paste an Amazon link or ASIN..." autocomplete="off" spellcheck="false" autofocus>
      <button id="addBtn" title="Add item">+</button>
    </div>


    <div class="toolbar" id="toolbar">
      <div class="toolbar-left">
        <label>
          <span class="chk">
            <input type="checkbox" id="selectAll">
            <span class="chk-box">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </span>
          </span>
          <span>Select all</span>
        </label>
        <button class="tool-btn" id="selectStarred">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--accent)" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span>Select starred</span>
        </button>
        <span class="item-count" id="itemCount"></span>
      </div>
      <div class="toolbar-right">
        <button class="tool-btn" id="fetchNamesBtn" title="Fetch names &amp; images from Amazon">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z"/><path d="M9 9h6"/><path d="M9 13h4"/></svg>
          <span>Sync</span>
        </button>
        <button class="tool-btn" id="saveBtn" title="Save groceries.json">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          <span>Save</span>
        </button>
      </div>
    </div>

    <div class="setup-banner" id="setupBanner">
      <p><strong>One-time setup:</strong> Drag this button to your bookmarks bar.</p>
      <a class="bookmarklet-link" id="bookmarkletLink" href="#">Add Groceries</a>
      <button class="setup-dismiss" id="setupDismiss">Got it, hide this</button>
    </div>

    <div class="report-panel" id="reportPanel" hidden></div>

    <div class="item-list" id="itemList"></div>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">&#127834;</div>
      <h2>Nothing here yet</h2>
      <p>Paste an Amazon product link or ASIN code above to start building your list.</p>
      <div class="hint">
        Try pasting a URL like <code>amazon.com/dp/B078HJZR4G</code><br>
        or just the ASIN: <code>B078HJZR4G</code>
      </div>
    </div>

    <div class="cart-bar" id="cartBar"></div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'mlab-groceries';
    let items = [];

    const STORES = { fresh: 'Amazon Fresh', wholefoods: 'Whole Foods' };

    // Cached DOM refs (set once in init)
    let $list, $empty, $toolbar, $cartBar, $selectAll, $countEl, $toast;

    // ── ASIN / URL helpers ────────────────────

    function isOrderURL(input) {
      return /amazon\.[^/]+\/.*order-details/i.test(input.trim());
    }

    function importFromOrder(url) {
      const orderUrl = url.trim() + (url.includes('#') ? '&' : '#') + 'mlab-import';
      window.open(orderUrl, '_blank');
      toast('Opened order page — click your "Add Groceries" bookmark!', 4000);
    }

    function receiveImport(data) {
      if (!data || !data.items || !data.items.length) return;
      let added = 0;
      for (const entry of data.items) {
        const asin = (entry.asin || '').toUpperCase();
        if (asin.length === 10 && !items.some(i => i.asin === asin)) {
          items.unshift({ id: uid(), asin, name: entry.name || asin, quantity: 1, checked: false, store: 'wholefoods', image: entry.image || '' });
          added++;
        }
      }
      if (added) { save(); render(); toast(`Imported ${added} item${added !== 1 ? 's' : ''} from order`); }
      else { toast('No new items found in order'); }
    }

    function extractASIN(input) {
      if (!input) return null;
      input = input.trim();
      const urlMatch = input.match(/(?:\/dp\/|\/product\/|\/gp\/product\/)([A-Z0-9]{10})/i);
      if (urlMatch) return urlMatch[1].toUpperCase();
      const raw = input.match(/^[A-Z0-9]{10}$/i);
      if (raw) return input.toUpperCase();
      return null;
    }

    function extractNameFromURL(input) {
      try {
        const match = input.match(/amazon\.[^/]+\/([^/]+)\/dp\//i);
        if (match && match[1].length > 2) {
          return match[1]
            .replace(/-/g, ' ')
            .replace(/\b\w/g, c => c.toUpperCase())
            .substring(0, 80);
        }
      } catch {}
      return null;
    }

    // ── Storage ───────────────────────────────

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      const data = {
        name: "M'lab Groceries",
        items: items.map(({ asin, name, quantity, store, staple, image }) => {
          const o = { asin, name, quantity, store };
          if (staple) o.staple = true;
          if (image) o.image = image;
          return o;
        })
      };
      fetch('/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data, null, 2) }).catch(() => {});
    }

    function load() {
      try {
        const d = localStorage.getItem(STORAGE_KEY);
        return d ? JSON.parse(d) : [];
      } catch { return []; }
    }

    // ── CRUD ──────────────────────────────────

    function uid() {
      return Date.now().toString(36) + Math.random().toString(36).substring(2, 7);
    }

    function addItem(input) {
      const asin = extractASIN(input);
      if (!asin) return 'invalid';

      const dup = items.find(i => i.asin === asin);
      if (dup) return { duplicate: dup.id };

      const name = extractNameFromURL(input) || asin;
      items.unshift({ id: uid(), asin, name, quantity: 1, checked: false, store: 'wholefoods' });
      save();
      render();
      return 'ok';
    }

    function removeItem(id) {
      items = items.filter(i => i.id !== id);
      save();
      render();
    }

    function updateChrome() {
      const selectedCount = items.filter(i => i.checked).length;
      $cartBar.classList.toggle('visible', selectedCount > 0);
      $selectAll.checked = items.length > 0 && items.every(i => i.checked);

      const groups = {};
      for (const item of items) {
        const s = item.store || 'fresh';
        (groups[s] = groups[s] || []).push(item);
      }
      let cartHtml = '';
      for (const store of Object.keys(groups)) {
        const checked = groups[store].filter(i => i.checked);
        if (checked.length) {
          cartHtml += `<button class="cart-btn" data-cart-store="${store}">Add ${checked.length} ${STORES[store] || store} item${checked.length !== 1 ? 's' : ''} to Cart</button>`;
        }
      }
      $cartBar.innerHTML = cartHtml;
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      item.checked = !item.checked;
      save();

      const card = document.querySelector(`[data-id="${id}"]`);
      if (card) {
        card.classList.toggle('selected', item.checked);
        const cb = card.querySelector('[data-toggle]');
        if (cb) cb.checked = item.checked;
      }
      updateChrome();
    }

    function setQuantity(id, delta) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      item.quantity = Math.max(1, item.quantity + delta);
      save();

      const el = document.querySelector(`[data-id="${id}"] .qty span`);
      if (el) {
        el.textContent = item.quantity;
        el.classList.remove('bump');
        void el.offsetWidth;
        el.classList.add('bump');
      }
    }

    function setName(id, name) {
      const item = items.find(i => i.id === id);
      if (!item || !name.trim()) return;
      item.name = name.trim();
      save();
    }

    function toggleStaple(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      item.staple = !item.staple;
      save();
      render();
    }

    function toggleAll(checked) {
      items.forEach(i => i.checked = checked);
      save();
      render();
    }

    // ── Cart ──────────────────────────────────

    function submitCart(store) {
      const sel = items.filter(i => i.checked && i.store === store);
      if (!sel.length) return;

      const encoded = sel.map(i => `${i.asin}:${i.quantity}:${i.store || 'wholefoods'}`).join(',');
      const url = `https://www.amazon.com/#mlab-groceries=${encoded}`;

      orderRun = { state: 'waiting', store, total: sel.length, startedAt: Date.now() };
      renderReport();
      clearTimeout(waitTimer);
      waitTimer = setTimeout(() => {
        if (orderRun && orderRun.state === 'waiting') { orderRun.stalled = true; renderReport(); }
      }, 45000);

      window.open(url, '_blank');
      toast(`Opened Amazon — click your bookmark!`, 4000);
    }

    // ── Order report ──────────────────────────

    let orderRun = null;
    let waitTimer = null;

    const STATUS_LABEL = {
      added: 'added', partial: 'partial', unavailable: 'unavailable',
      failed: 'failed', unknown: 'unverified'
    };

    function receiveProgress(d) {
      if (!d || !d.total) return;
      orderRun = { ...(orderRun || {}), state: 'running', current: d.current, total: d.total, asin: d.asin };
      renderReport();
    }

    function receiveReport(d) {
      if (!d || !Array.isArray(d.results)) return;
      clearTimeout(waitTimer);
      if (currentEngineVersion && d.version && d.version !== currentEngineVersion) {
        document.getElementById('setupBanner').style.display = '';
        toast('Your bookmark ran an older engine — drag the button to your bookmarks bar again to update it', 6000);
      }
      orderRun = { state: 'done', results: d.results, diagnostics: d.diagnostics || '', finishedAt: Date.now() };
      try { localStorage.setItem('mlab-last-report', JSON.stringify(orderRun)); } catch {}
      if (orderRun.diagnostics) fetch('/diag', { method: 'POST', body: orderRun.diagnostics }).catch(() => {});

      // Opportunistic sync: the run fetched every product page anyway.
      receiveNames({ names: d.names, images: d.images });

      // Uncheck what made it into the cart, so what's left checked = problems.
      let unchecked = 0;
      for (const r of d.results) {
        if (r.status === 'added') {
          const item = items.find(i => i.asin === r.asin);
          if (item && item.checked) { item.checked = false; unchecked++; }
        }
      }
      if (unchecked) { save(); render(); }
      renderReport();
    }

    function dismissReport() {
      orderRun = null;
      clearTimeout(waitTimer);
      try { localStorage.removeItem('mlab-last-report'); } catch {}
      renderReport();
    }

    function copyDiagnostics() {
      if (!orderRun || !orderRun.diagnostics) return;
      navigator.clipboard.writeText(orderRun.diagnostics).then(
        () => toast('Diagnostics copied'),
        () => toast('Copy failed — diagnostics are in localStorage under mlab-last-report')
      );
    }

    function renderReport() {
      const $panel = document.getElementById('reportPanel');
      if (!orderRun) { $panel.hidden = true; return; }
      $panel.hidden = false;

      let html = `<div class="report-head"><h3>Order report</h3>
        <button class="report-dismiss" data-report-dismiss title="Dismiss">✕</button></div>`;

      if (orderRun.state === 'waiting') {
        html += `<div class="report-wait"><span class="pulse"></span>
          Amazon tab opened — click your <strong>&nbsp;Add Groceries&nbsp;</strong> bookmark there.</div>`;
        if (orderRun.stalled) {
          html += `<div class="report-sub">Still waiting… Is the Amazon tab open? Is the bookmark on your bar? (One-time setup above.)</div>`;
        }
      } else if (orderRun.state === 'running') {
        html += `<div class="report-wait"><span class="pulse"></span>
          Adding ${orderRun.current}/${orderRun.total}…</div>`;
      } else {
        const rs = orderRun.results;
        const added = rs.filter(r => r.status === 'added').length;
        const counts = {};
        rs.forEach(r => { if (r.status !== 'added') counts[r.status] = (counts[r.status] || 0) + 1; });
        const extras = Object.entries(counts).map(([s, n]) => `${n} ${STATUS_LABEL[s] || s}`).join(' · ');
        html += `<div class="report-sub"><strong>${added}/${rs.length} added to cart</strong>${extras ? ' · ' + extras : ''}</div>`;
        html += `<div class="report-rows">`;
        for (const r of rs) {
          const item = items.find(i => i.asin === r.asin);
          const name = (item && item.name !== item.asin ? item.name : r.name) || r.asin;
          html += `<div class="report-row">
            <span class="report-dot ${r.status}"></span>
            <span style="flex:1;min-width:0">
              <span class="r-name">${esc(name.substring(0, 70))}</span>
              ${r.qty > 1 ? `<span class="item-asin">×${r.qty}</span>` : ''}
              ${r.detail ? `<div class="r-detail">${esc(r.detail)}</div>` : ''}
            </span>
          </div>`;
        }
        html += `</div><div class="report-actions">`;
        if (orderRun.diagnostics) {
          html += `<button class="tool-btn" data-report-copy>Copy diagnostics</button>`;
        }
        html += `</div>`;
      }
      $panel.innerHTML = html;
    }

    function fetchNames() {
      const needsInfo = items.filter(i => i.name === i.asin || !i.image);
      if (!needsInfo.length) { toast('All items up to date'); return; }

      const url = `https://www.amazon.com/#mlab-names=${needsInfo.map(i => i.asin).join(',')}`;
      window.open(url, '_blank');
      toast('Opened Amazon — click your "Add Groceries" bookmark!', 4000);
    }

    function receiveNames(data) {
      if (!data) return;
      let updated = 0;
      if (data.names) {
        for (const [asin, name] of Object.entries(data.names)) {
          const item = items.find(i => i.asin === asin);
          if (item && name) { item.name = name; updated++; }
        }
      }
      if (data.images) {
        for (const [asin, url] of Object.entries(data.images)) {
          const item = items.find(i => i.asin === asin && !i.image);
          if (item && url) { item.image = url; updated++; }
        }
      }
      if (updated) { save(); render(); toast(`Updated ${updated} item${updated !== 1 ? 's' : ''}`); }
    }

    // The dragged bookmark is a base64 snapshot of bookmarklet.js taken when
    // this page loaded. It must not script-load from localhost on amazon.com:
    // the CSP outcome varies by page, and a successful load runs in global
    // scope where amazon's own globals (e.g. `P`) collide. The eval below runs
    // inside a function, so the engine stays scoped. The report's version
    // handshake nags to re-drag when the snapshot is stale.
    let currentEngineVersion = '';

    async function buildBookmarklet() {
      try {
        const src = await (await fetch('/bookmarklet.js')).text();
        currentEngineVersion = (src.match(/MLAB_VERSION = ["']([^"']+)["']/) || [])[1] || '';
        const b64 = btoa(unescape(encodeURIComponent(src)));
        return "javascript:void(function(){try{eval(decodeURIComponent(escape(atob('" + b64 +
          "'))))}catch(e){alert('M lab Groceries engine crashed: '+e)}})()";
      } catch {
        return "javascript:alert('M lab Groceries: could not embed the engine - reload the app page and re-drag this button.')";
      }
    }


    // ── Import / Export ───────────────────────

    async function saveJSON() {
      if (!items.length) { toast('Nothing to save'); return; }
      const data = {
        name: "M'lab Groceries",
        exported: new Date().toISOString(),
        items: items.map(({ asin, name, quantity, store, staple }) => ({ asin, name, quantity, store, staple: staple || undefined }))
      };
      try {
        const resp = await fetch('/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data, null, 2) });
        if (resp.ok) { toast('Saved!'); return; }
      } catch {}
      toast('Save failed — is the server running? (node server.js)');
    }

    // ── Toast ─────────────────────────────────

    let toastTimer;
    function toast(msg, ms = 2500) {
      $toast.textContent = msg;
      $toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => $toast.classList.remove('show'), ms);
    }

    // ── Render ────────────────────────────────

    function renderCard(item) {
      return `
        <div class="item-card ${item.checked ? 'selected' : ''} ${item.staple ? 'staple' : ''}" data-id="${item.id}">
          <span class="chk">
            <input type="checkbox" ${item.checked ? 'checked' : ''} data-toggle="${item.id}">
            <span class="chk-box">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </span>
          </span>
          <img class="item-thumb" src="${item.image || 'https://m.media-amazon.com/images/P/' + item.asin + '._AC_US100_.jpg'}" alt="" data-stop>
          <div class="item-body" data-card-toggle="${item.id}">
            <div class="item-name ${item.name === item.asin ? 'unnamed' : ''}" contenteditable="true" data-name-id="${item.id}" spellcheck="false" ${item.name === item.asin ? 'data-placeholder="Click to name this item"' : ''}>${esc(item.name === item.asin ? '' : item.name)}</div>
            <div class="item-meta">
              <span class="item-asin">${item.asin}</span>
              <a href="https://www.amazon.com/dp/${item.asin}" target="_blank" rel="noopener" class="item-link" data-stop>
                View
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              </a>
            </div>
          </div>
          <div class="item-actions">
            <button class="staple-btn ${item.staple ? 'active' : ''}" data-staple="${item.id}" title="Mark as staple">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="${item.staple ? 'var(--accent)' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            </button>
            <div class="qty">
              <button data-qty-down="${item.id}">&#8722;</button>
              <span>${item.quantity}</span>
              <button data-qty-up="${item.id}">+</button>
            </div>
            <button class="del-btn" data-del="${item.id}" title="Remove">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>`;
    }

    function render() {
      const hasItems = items.length > 0;
      const selectedCount = items.filter(i => i.checked).length;

      $empty.classList.toggle('visible', !hasItems);
      $toolbar.style.display = hasItems ? 'flex' : 'none';
      $cartBar.classList.toggle('visible', selectedCount > 0);

      $countEl.textContent = hasItems
        ? `${items.length} item${items.length !== 1 ? 's' : ''}`
        : '';

      $selectAll.checked = hasItems && items.every(i => i.checked);

      // Group by store
      const groups = {};
      for (const item of items) {
        const s = item.store || 'fresh';
        (groups[s] = groups[s] || []).push(item);
      }

      const storeKeys = Object.keys(groups);
      const multiStore = storeKeys.length > 1;

      let html = '';
      for (const store of storeKeys) {
        const storeItems = groups[store].slice().sort((a, b) => {
          if (a.staple !== b.staple) return a.staple ? -1 : 1;
          const anamed = a.name !== a.asin, bnamed = b.name !== b.asin;
          if (anamed !== bnamed) return anamed ? -1 : 1;
          return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
        });
        if (multiStore) {
          html += `<div class="store-section"><h3>${esc(STORES[store] || store)}</h3><span class="store-count">${storeItems.length}</span></div>`;
        }
        html += storeItems.map(renderCard).join('');
      }
      $list.innerHTML = html;

      $list.querySelectorAll('.item-thumb').forEach(img => {
        const hide = () => { img.style.display = 'none'; };
        if (img.complete) { if (img.naturalWidth < 10) hide(); }
        else { img.onload = function() { if (this.naturalWidth < 10) hide(); }; img.onerror = hide; }
      });

      // Cart buttons — one per store that has checked items
      let cartHtml = '';
      for (const store of storeKeys) {
        const checked = groups[store].filter(i => i.checked);
        if (checked.length) {
          cartHtml += `<button class="cart-btn" data-cart-store="${store}">Add ${checked.length} ${STORES[store] || store} item${checked.length !== 1 ? 's' : ''} to Cart</button>`;
        }
      }
      $cartBar.innerHTML = cartHtml;
    }

    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Events ────────────────────────────────

    function setup() {
      const input = document.getElementById('addInput');
      const addBtn = document.getElementById('addBtn');

      function doAdd() {
        const val = input.value.trim();
        if (!val) return;
        if (isOrderURL(val)) {
          importFromOrder(val);
          input.value = '';
          input.classList.remove('valid', 'invalid');
          return;
        }
        const result = addItem(val);
        if (result === 'ok') {
          input.value = '';
          input.classList.remove('valid', 'invalid');
          toast('Added!');
        } else if (result === 'invalid') {
          input.classList.add('shake');
          setTimeout(() => input.classList.remove('shake'), 400);
          toast('Not a valid Amazon link or ASIN');
        } else if (result.duplicate) {
          input.value = '';
          input.classList.remove('valid', 'invalid');
          const card = document.querySelector(`[data-id="${result.duplicate}"]`);
          if (card) {
            card.classList.add('duplicate-flash');
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => card.classList.remove('duplicate-flash'), 700);
          }
          toast('Already on your list');
        }
      }

      addBtn.addEventListener('click', doAdd);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });

      input.addEventListener('input', () => {
        const v = input.value.trim();
        if (!v) { input.classList.remove('valid', 'invalid'); return; }
        const valid = extractASIN(v) || isOrderURL(v);
        input.classList.toggle('valid', !!valid);
        input.classList.toggle('invalid', !valid && v.length > 3);
      });

      input.addEventListener('paste', () => {
        setTimeout(() => {
          const v = input.value.trim();
          if (v && (extractASIN(v) || isOrderURL(v))) doAdd();
        }, 0);
      });

      document.getElementById('selectAll').addEventListener('change', e => {
        toggleAll(e.target.checked);
      });

      document.getElementById('cartBar').addEventListener('click', e => {
        const btn = e.target.closest('[data-cart-store]');
        if (btn) submitCart(btn.dataset.cartStore);
      });

      document.getElementById('reportPanel').addEventListener('click', e => {
        if (e.target.closest('[data-report-dismiss]')) dismissReport();
        else if (e.target.closest('[data-report-copy]')) copyDiagnostics();
      });

      document.getElementById('saveBtn').addEventListener('click', saveJSON);
      document.getElementById('fetchNamesBtn').addEventListener('click', fetchNames);
      document.getElementById('selectStarred').addEventListener('click', () => {
        const allStarredChecked = items.filter(i => i.staple).every(i => i.checked);
        if (allStarredChecked) {
          items.forEach(i => i.checked = false);
        } else {
          items.forEach(i => i.checked = !!i.staple);
        }
        save();
        render();
      });

      document.getElementById('itemList').addEventListener('click', e => {
        const t = e.target;
        if (t.closest('[data-stop]') || t.closest('.item-name')) return;

        const staple = t.closest('[data-staple]');
        if (staple) { e.stopPropagation(); toggleStaple(staple.dataset.staple); return; }

        const toggle = t.closest('[data-toggle]');
        if (toggle) { toggleItem(toggle.dataset.toggle); return; }

        const cardToggle = t.closest('[data-card-toggle]');
        if (cardToggle) { toggleItem(cardToggle.dataset.cardToggle); return; }

        const qUp = t.closest('[data-qty-up]');
        if (qUp) { e.stopPropagation(); setQuantity(qUp.dataset.qtyUp, 1); return; }

        const qDown = t.closest('[data-qty-down]');
        if (qDown) { e.stopPropagation(); setQuantity(qDown.dataset.qtyDown, -1); return; }

        const del = t.closest('[data-del]');
        if (del) { e.stopPropagation(); removeItem(del.dataset.del); return; }
      });

      document.getElementById('itemList').addEventListener('blur', e => {
        const nameEl = e.target.closest('[data-name-id]');
        if (nameEl) setName(nameEl.dataset.nameId, nameEl.textContent);
      }, true);

      document.getElementById('itemList').addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.target.closest('[data-name-id]')) {
          e.preventDefault();
          e.target.blur();
        }
      });
    }

    // ── Init ──────────────────────────────────

    document.addEventListener('DOMContentLoaded', () => {
      $list = document.getElementById('itemList');
      $empty = document.getElementById('emptyState');
      $toolbar = document.getElementById('toolbar');
      $cartBar = document.getElementById('cartBar');
      $selectAll = document.getElementById('selectAll');
      $countEl = document.getElementById('itemCount');
      $toast = document.getElementById('toast');

      window.addEventListener('message', e => {
        if (!e.data) return;
        if (e.data.type === 'mlab-names') receiveNames(e.data);
        if (e.data.type === 'mlab-import') receiveImport(e.data);
        if (e.data.type === 'mlab-progress') receiveProgress(e.data);
        if (e.data.type === 'mlab-report') receiveReport(e.data);
      });

      try {
        const lastReport = localStorage.getItem('mlab-last-report');
        if (lastReport) orderRun = JSON.parse(lastReport);
      } catch {}
      renderReport();

      items = load();
      if (!items.length) {
        fetch('/groceries.json').then(r => r.ok ? r.json() : null).then(data => {
          if (!data) return;
          const list = Array.isArray(data) ? data : (data.items || []);
          list.forEach(entry => {
            const asin = (entry.asin || '').toUpperCase();
            if (asin.length === 10 && !items.some(i => i.asin === asin)) {
              items.push({ id: uid(), asin, name: entry.name || asin, quantity: entry.quantity || 1, checked: false, store: entry.store || 'fresh', staple: entry.staple || false, image: entry.image || '' });
            }
          });
          if (items.length) { save(); render(); }
        }).catch(() => {});
      }
      render();
      setup();

      buildBookmarklet().then(href => {
        document.getElementById('bookmarkletLink').href = href;
      });

      document.getElementById('setupDismiss').addEventListener('click', () => {
        document.getElementById('setupBanner').style.display = 'none';
        localStorage.setItem('mlab-setup-dismissed', '1');
      });
    });
  </script>
</body>
</html>
